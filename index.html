<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智启通途 · 智慧交通可视化平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #1878FF; --primary-light: #E8F2FF; --primary-dark: #0F5FD4;
  --accent1: #00B4D8; --accent2: #0EA5E9;
  --warn: #F59E0B; --warn-light: #FEF3C7;
  --ok: #10B981; --ok-light: #D1FAE5;
  --danger: #EF4444; --danger-light: #FEE2E2;
  --bg: #F0F7FF; --white: #FFFFFF; --card-border: #D4E5F7;
  --text-1: #0F2C52; --text-2: #4A7FA5; --text-3: #94B8D0;
  --purple: #7C3AED;
  --font: 'Noto Sans SC', 'PingFang SC', 'Helvetica Neue', sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
}
html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text-1); }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }
a { text-decoration: none; color: inherit; }
input[type=range] { height: 4px; accent-color: var(--primary); }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
@keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes countUp { from { opacity: 0; } to { opacity: 1; } }
@keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }

/* Layout */
.app { display: flex; min-height: 100vh; }
.sidebar { width: 200px; min-width: 200px; height: 100vh; background: var(--white); border-right: 1px solid var(--card-border); display: flex; flex-direction: column; position: fixed; left: 0; top: 0; z-index: 100; }
.main { margin-left: 200px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
.topbar { height: 48px; background: var(--white); border-bottom: 1px solid var(--card-border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: sticky; top: 0; z-index: 50; }
.content { flex: 1; overflow: auto; }
.page { padding: 16px 20px; animation: fadeUp 0.2s ease-out; }

/* Sidebar */
.sidebar-logo { padding: 20px 16px 12px; border-bottom: 1px solid var(--card-border); }
.sidebar-logo-icon { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--primary), var(--accent1)); display: flex; align-items: center; justify-content: center; }
.sidebar-nav { flex: 1; padding: 12px 8px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 6px; margin-bottom: 2px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.15s; font-size: 13.5px; color: var(--text-2); }
.nav-item:hover { background: rgba(232,242,255,0.5); }
.nav-item.active { background: var(--primary-light); border-left-color: var(--primary); color: var(--primary); font-weight: 600; }
.sidebar-status { padding: 12px 16px; border-top: 1px solid var(--card-border); font-size: 11px; color: var(--text-3); }

/* Card */
.card { background: var(--white); border-radius: 8px; border: 1px solid var(--card-border); box-shadow: 0 1px 4px rgba(15,44,82,0.06); }

/* Metric Card */
.metric-card { padding: 16px 18px; flex: 1; min-width: 0; }
.metric-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.metric-value { font-size: 28px; font-weight: 700; font-family: var(--mono); color: var(--text-1); }
.metric-unit { font-size: 13px; color: var(--text-2); }
.metric-label { font-size: 12px; color: var(--text-3); }

/* Tag */
.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; border: 1px solid var(--primary); border-radius: 6px; background: var(--white); color: var(--primary); font-size: 12px; font-weight: 500; cursor: pointer; font-family: var(--font); transition: all 0.15s; }
.btn:hover { background: var(--primary); color: #fff; }
.btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn-primary:hover { background: var(--primary-dark); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Flex / Grid helpers */
.flex { display: flex; } .flex-col { flex-direction: column; } .gap-12 { gap: 12px; } .gap-8 { gap: 8px; }
.items-center { align-items: center; } .justify-between { justify-content: space-between; }
.flex-1 { flex: 1; min-width: 0; }

/* Table area */
.alert-bar { width: 3px; border-radius: 2px; flex-shrink: 0; align-self: stretch; }

/* Chat bubble */
.bubble-user { background: var(--primary); color: #fff; border-radius: 12px 12px 2px 12px; padding: 10px 14px; max-width: 70%; font-size: 13px; line-height: 1.6; }
.bubble-ai { background: var(--white); border: 1px solid var(--card-border); color: var(--text-1); border-radius: 12px 12px 12px 2px; padding: 10px 14px; max-width: 70%; font-size: 13px; line-height: 1.6; }
.typing-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

/* SVG charts */
svg text { user-select: none; }
</style>
</head>

// ─── SVG Chart helpers ─────────────────────────
function svgAreaChart(data,keys,colors,W=500,H=200) {
  const p={t:20,r:60,b:30,l:40},cw=W-p.l-p.r,ch=H-p.t-p.b,mx=90,xs=cw/(data.length-1);
  let s=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:100%">`;
  [0,30,60,90].forEach(v=>{const y=p.t+ch-(v/mx)*ch;s+=`<line x1="${p.l}" y1="${y}" x2="${p.l+cw}" y2="${y}" stroke="var(--card-border)" stroke-width="0.5"/><text x="${p.l-6}" y="${y+3}" text-anchor="end" fill="var(--text-3)" font-size="9" font-family="var(--mono)">${v}</text>`;});
  data.forEach((d,i)=>{if(i%4===0) s+=`<text x="${p.l+i*xs}" y="${H-8}" text-anchor="middle" fill="var(--text-3)" font-size="8" font-family="var(--mono)">${d.hour}</text>`;});
  keys.forEach((k,ki)=>{
    const pts=data.map((d,i)=>({x:p.l+i*xs,y:p.t+ch-(Math.max(0,Math.min(mx,d[k]))/mx)*ch}));
    const line=pts.map(pt=>`${pt.x},${pt.y}`).join(' ');
    const area=`M${pts[0].x},${p.t+ch} `+pts.map(pt=>`L${pt.x},${pt.y}`).join(' ')+` L${pts[pts.length-1].x},${p.t+ch} Z`;
    s+=`<defs><linearGradient id="ag${ki}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${colors[ki]}" stop-opacity="0.3"/><stop offset="100%" stop-color="${colors[ki]}" stop-opacity="0.02"/></linearGradient></defs>`;
    s+=`<path d="${area}" fill="url(#ag${ki})"/><polyline points="${line}" fill="none" stroke="${colors[ki]}" stroke-width="2"/>`;
  });
  keys.forEach((k,i)=>{s+=`<g transform="translate(${p.l+cw-10-(keys.length-1-i)*60},10)"><rect width="10" height="3" rx="1.5" fill="${colors[i]}"/><text x="14" y="4" fill="var(--text-2)" font-size="9">${k}</text></g>`;});
  return s+'</svg>';
}

function svgBarChart(data,xK,yK,W=500,H=200,colorFn) {
  const mx=Math.max(...data.map(d=>d[yK]))*1.2,p={t:20,r:10,b:35,l:35},cw=W-p.l-p.r,ch=H-p.t-p.b;
  const bw=Math.min(36,cw/data.length*0.6),gap=cw/data.length;
  let s=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:100%">`;
  data.forEach((d,i)=>{
    const x=p.l+i*gap+(gap-bw)/2,h=(d[yK]/mx)*ch,y=p.t+ch-h,c=colorFn?colorFn(d[yK]):T.primary;
    s+=`<rect x="${x}" y="${y}" width="${bw}" height="${h}" rx="3" fill="${c}" opacity="0.85"/><text x="${x+bw/2}" y="${y-4}" text-anchor="middle" fill="var(--text-1)" font-size="9" font-weight="600" font-family="var(--mono)">${d[yK]}</text><text x="${x+bw/2}" y="${p.t+ch+14}" text-anchor="middle" fill="var(--text-2)" font-size="8">${d[xK]}</text>`;
  });
  return s+'</svg>';
}

function svgDualBar(data,xK,y1K,y2K,c1,c2,l1,l2,W=560,H=220,showY2=true) {
  const vals=data.flatMap(d=>showY2?[d[y1K],d[y2K]]:[d[y1K]]),mx=Math.max(...vals)*1.25;
  const p={t:30,r:10,b:40,l:35},cw=W-p.l-p.r,ch=H-p.t-p.b,gap=cw/data.length,bw=Math.min(20,gap*0.3);
  let s=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:100%">`;
  s+=`<rect x="${p.l}" y="6" width="10" height="4" rx="2" fill="${c1}"/><text x="${p.l+14}" y="11" fill="var(--text-2)" font-size="9">${l1}</text>`;
  s+=`<rect x="${p.l+80}" y="6" width="10" height="4" rx="2" fill="${showY2?c2:'#ccc'}"/><text x="${p.l+94}" y="11" fill="var(--text-2)" font-size="9">${l2}</text>`;
  data.forEach((d,i)=>{
    const cx=p.l+i*gap+gap/2,h1=(d[y1K]/mx)*ch,h2=showY2?(d[y2K]/mx)*ch:0;
    s+=`<rect x="${cx-bw-1}" y="${p.t+ch-h1}" width="${bw}" height="${h1}" rx="2" fill="${c1}" opacity="0.8"/><text x="${cx-bw/2-1}" y="${p.t+ch-h1-3}" text-anchor="middle" fill="var(--text-1)" font-size="8" font-family="var(--mono)">${d[y1K]}</text>`;
    s+=`<rect x="${cx+1}" y="${p.t+ch-h2}" width="${bw}" height="${h2||0}" rx="2" fill="${showY2?c2:'#D1D5DB'}" opacity="${showY2?0.8:0.3}"/>`;
    if(showY2) s+=`<text x="${cx+bw/2+1}" y="${p.t+ch-h2-3}" text-anchor="middle" fill="var(--text-1)" font-size="8" font-family="var(--mono)">${d[y2K]}</text>`;
    s+=`<text x="${cx}" y="${p.t+ch+16}" text-anchor="middle" fill="var(--text-2)" font-size="8">${d[xK]}</text>`;
  });
  return s+'</svg>';
}

function svgLineCompare(data,W=560,H=200) {
  const mx=80,p={t:20,r:60,b:30,l:40},cw=W-p.l-p.r,ch=H-p.t-p.b,xs=cw/(data.length-1);
  const toY=v=>p.t+ch-(Math.max(0,Math.min(mx,v))/mx)*ch;
  let s=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:100%">`;
  [0,20,40,60,80].forEach(v=>{const y=toY(v);s+=`<line x1="${p.l}" y1="${y}" x2="${p.l+cw}" y2="${y}" stroke="var(--card-border)" stroke-width="0.5"/><text x="${p.l-6}" y="${y+3}" text-anchor="end" fill="var(--text-3)" font-size="9" font-family="var(--mono)">${v}</text>`;});
  s+=`<polyline points="${data.map((d,i)=>`${p.l+i*xs},${toY(d.pred)}`).join(' ')}" fill="none" stroke="${T.primary}" stroke-width="2"/>`;
  s+=`<polyline points="${data.map((d,i)=>`${p.l+i*xs},${toY(d.real)}`).join(' ')}" fill="none" stroke="${T.accent1}" stroke-width="2" stroke-dasharray="6 3"/>`;
  s+=`<rect x="${p.l+cw-5}" y="6" width="10" height="3" rx="1.5" fill="${T.primary}"/><text x="${p.l+cw+8}" y="10" fill="var(--text-2)" font-size="9">预测</text>`;
  s+=`<rect x="${p.l+cw-5}" y="18" width="10" height="3" rx="1.5" fill="${T.accent1}"/><text x="${p.l+cw+8}" y="22" fill="var(--text-2)" font-size="9">真实</text>`;
  return s+'</svg>';
}

// ─── CANVAS ──────────────────────────────────
function startCanvas() {
  cancelAnimationFrame(canvasRaf);
  const canvas=document.getElementById('netCanvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const nodeMap={};NETWORK_NODES.forEach(n=>nodeMap[n.id]=n);

  function draw(){
    const W=canvas.width=canvas.offsetWidth*2,H=canvas.height=canvas.offsetHeight*2;
    ctx.scale(2,2);const w=canvas.offsetWidth,h=canvas.offsetHeight;ctx.clearRect(0,0,w,h);
    NETWORK_EDGES.forEach(([a,b],i)=>{
      const na=nodeMap[a],nb=nodeMap[b],spd=edgeSpeeds[i],col=speedColor(spd);
      ctx.beginPath();ctx.moveTo(na.x*w,na.y*h);ctx.lineTo(nb.x*w,nb.y*h);ctx.strokeStyle=col;ctx.lineWidth=3;ctx.stroke();
      const ps=particles[i],sf=.001+(spd/80)*.004;
      ps.forEach((p,j)=>{ps[j]=(p+sf)%1;const px=na.x*w+(nb.x*w-na.x*w)*ps[j],py=na.y*h+(nb.y*h-na.y*h)*ps[j];ctx.beginPath();ctx.arc(px,py,3,0,Math.PI*2);ctx.fillStyle=col;ctx.globalAlpha=.8;ctx.fill();ctx.globalAlpha=1;});
    });
    NETWORK_NODES.forEach(n=>{
      const x=n.x*w,y=n.y*h;
      const rel=NETWORK_EDGES.reduce((a,[ea,eb],i)=>{if(ea===n.id||eb===n.id)a.push(edgeSpeeds[i]);return a;},[]);
      const avg=rel.reduce((s,v)=>s+v,0)/rel.length;
      if(avg<25){const pulse=.3+.3*Math.sin(Date.now()/400);ctx.beginPath();ctx.arc(x,y,18,0,Math.PI*2);ctx.fillStyle=`rgba(239,68,68,${pulse})`;ctx.fill();}
      ctx.beginPath();ctx.arc(x,y,10,0,Math.PI*2);ctx.fillStyle=speedColor(avg);ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
      ctx.fillStyle=T.text1;ctx.font=`600 11px ${getComputedStyle(document.body).fontFamily}`;ctx.textAlign='center';ctx.fillText(n.id,x,y-16);
    });
    canvasRaf=requestAnimationFrame(draw);
  }
  draw();
}
setInterval(()=>{edgeSpeeds=edgeSpeeds.map(s=>Math.max(5,Math.min(80,s+Math.round((Math.random()-.5)*6))));},3000);

        <div style="width:36px;height:36px;border-radius:50%;background:${cur.color}20;display:flex;align-items:center;justify-content:center">${icon('brainCircuit',18,cur.color)}</div>
        <div><div style="font-weight:700;font-size:14px">路语者 AI 智能体</div><div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-3)"><span style="width:6px;height:6px;border-radius:3px;background:var(--ok);display:inline-block"></span>在线 · ${cur.label}模式 · RAG + DeepSeek</div></div>
        <div style="margin-left:auto"><a href="https://appbuilder.baidu.com/s/dB42RTdy" target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:8px;background:linear-gradient(135deg,${T.primary},${T.accent1});color:#fff;font-size:12.5px;font-weight:600;box-shadow:0 2px 8px ${T.primary}40">${icon('externalLink',14,'#fff')} 打开完整版 AI 智能体</a></div>
      </div>
      <div id="chat-scroll" style="flex:1;overflow:auto;padding:16px 20px">
        ${state.agentMessages.map(m=>`<div style="display:flex;justify-content:${m.from==='user'?'flex-end':'flex-start'};margin-bottom:12px;animation:msgIn 0.25s ease-out">${m.from==='ai'?`<div style="width:28px;height:28px;border-radius:50%;background:${cur.color}20;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:8px;margin-top:2px">${icon('brainCircuit',14,cur.color)}</div>`:''}<div class="${m.from==='user'?'bubble-user':'bubble-ai'}">${m.text}</div></div>`).join('')}
        ${state.agentTyping?`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><div style="width:28px;height:28px;border-radius:50%;background:${cur.color}20;display:flex;align-items:center;justify-content:center;flex-shrink:0">${icon('brainCircuit',14,cur.color)}</div><div style="padding:10px 18px;border-radius:12px 12px 12px 2px;background:var(--white);border:1px solid var(--card-border);display:flex;gap:4px"><span class="typing-dot" style="background:${cur.color};animation:bounce 1s ease-in-out 0s infinite"></span><span class="typing-dot" style="background:${cur.color};animation:bounce 1s ease-in-out 0.15s infinite"></span><span class="typing-dot" style="background:${cur.color};animation:bounce 1s ease-in-out 0.3s infinite"></span></div></div>`:''}
      </div>
      <div style="padding:12px 16px;border-top:1px solid var(--card-border);display:flex;gap:8px;align-items:center">
        <input id="chat-input" type="text" value="${state.agentInput.replace(/"/g,'&quot;')}" placeholder="${phs[state.agentRole]}" style="flex:1;padding:10px 14px;border-radius:8px;border:1px solid var(--card-border);outline:none;font-size:13px;font-family:var(--font);color:var(--text-1)">
        <button class="btn btn-primary" id="chat-send" style="padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600" ${state.agentTyping?'disabled':''}>${icon('send',14,'#fff')} 发送</button>
      </div>
    </div>
    <div class="card" style="width:220px;min-width:220px;padding:16px;display:flex;flex-direction:column;gap:16px">
      <a href="https://appbuilder.baidu.com/s/dB42RTdy" target="_blank" rel="noopener noreferrer" style="display:block;padding:14px;border-radius:8px;background:linear-gradient(135deg,${T.primary}10,${T.accent1}15);border:1px solid ${T.primary}30">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">${icon('sparkles',14,T.primary)}<span style="font-size:12px;font-weight:700;color:${T.primary}">完整版 AI 智能体</span></div>
        <div style="font-size:11px;color:var(--text-2);line-height:1.5;margin-bottom:8px">点击跳转至百度 AppBuilder 体验完整的路语者 AI 多轮对话能力</div>
        <div style="display:flex;align-items:center;justify-content:center;gap:4px;padding:6px 0;border-radius:6px;background:${T.primary};color:#fff;font-size:11.5px;font-weight:600">${icon('externalLink',12,'#fff')} 立即体验</div>
      </a>
      <div><div style="font-weight:700;font-size:13px;margin-bottom:10px">知识库状态</div>${KNOWLEDGE.map(s=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--card-border)"><span style="font-size:11px;color:var(--text-3)">${s.l}</span><span style="font-size:11px;font-family:var(--mono);font-weight:500">${s.v}</span></div>`).join('')}</div>
      <div><div style="font-weight:700;font-size:13px;margin-bottom:10px">问答对分布</div>${QA_DIST.map(d=>`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:var(--text-2)">${d.role}</span><span style="font-family:var(--mono);font-weight:500">${d.count.toLocaleString()}</span></div><div style="height:5px;border-radius:3px;background:var(--bg)"><div style="height:100%;border-radius:3px;background:${d.color};width:${(d.count/QA_DIST[0].count)*100}%"></div></div></div>`).join('')}</div>
    </div>
  </div>`;
}

function agentSend(text) {
  const msg=text||state.agentInput.trim();
  if(!msg||state.agentTyping) return;
  state.agentInput='';
  state.agentMessages.push({from:'user',text:msg});
  state.agentTyping=true;
  render();
  setTimeout(()=>{
    const el=document.getElementById('chat-scroll');if(el) el.scrollTop=el.scrollHeight;
  },50);
  setTimeout(()=>{
    const resp=AGENT_RESP[state.agentRole];
    state.agentMessages.push({from:'ai',text:resp[msg]||resp.default});
    state.agentTyping=false;
    render();
    setTimeout(()=>{const el=document.getElementById('chat-scroll');if(el) el.scrollTop=el.scrollHeight;},50);
  },800+Math.random()*1200);
}

// ─── POLICY ──────────────────────────────────
function renderPolicy() {
  const sel=state.policySelected,run=state.policyRunning,prog=state.policyProgress,res=state.policyResult;
  const resultItems=res?[
    {l:"全市平均速度变化",v:res.speed,c:T.ok},{l:"高峰车流量变化",v:res.flow,c:T.ok},
    {l:"CO₂ 减排估算",v:res.co2,c:T.primary},{l:"公共交通分担率",v:res.transit,c:T.primary},
    {l:"路网拥堵指数",v:res.congestion,c:T.warn},{l:"年均节约时间成本",v:res.cost,c:T.purple},
  ]:[];
  const barData=POLICY_ROADS.map((r,i)=>({road:r,before:POLICY_BEFORE[i],after:res?res.afterSpeeds[i]:POLICY_BEFORE[i]}));

  return `<div class="page" style="display:flex;flex-direction:column;gap:12px">
    <div class="flex gap-12">
      <div class="card" style="flex:1;padding:16px">
        <div style="font-weight:700;font-size:14px;margin-bottom:12px">政策方案选择</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
          ${POLICY_OPTS.map(p=>{const active=sel===p.id;return `<div class="policy-opt" data-pid="${p.id}" style="padding:12px;border-radius:8px;cursor:${run?'not-allowed':'pointer'};border:${active?'2px solid '+T.warn:'1px solid var(--card-border)'};background:${active?T.warnLight:'var(--white)'};transition:all 0.15s"><div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">${icon(p.icon,15,active?T.warn:'var(--text-3)')}<span style="font-weight:600;font-size:13px">${p.title}</span></div><div style="font-size:11px;color:var(--text-2)">${p.desc}</div></div>`;}).join('')}
        </div>
        <button id="policy-run" class="btn btn-primary" style="width:100%;padding:10px;border-radius:8px;font-size:14px;font-weight:600;justify-content:center;${(!sel||run)?'opacity:0.4;cursor:not-allowed':''}" ${(!sel||run)?'disabled':''}>${run?`<span style="display:inline-block;animation:spin 1s linear infinite;width:16px;height:16px;border:2px solid #fff;border-top-color:transparent;border-radius:50%"></span> 运行中 ${Math.round(prog)}%`:`${icon('sparkles',16,'#fff')} 运行仿真`}</button>
        ${run?`<div style="height:4px;border-radius:2px;background:var(--bg);margin-top:8px;overflow:hidden"><div style="height:100%;background:var(--primary);border-radius:2px;width:${prog}%;transition:width 0.15s"></div></div>`:''}
      </div>
      <div class="card" style="flex:1;padding:16px">
        <div style="font-weight:700;font-size:14px;margin-bottom:12px">仿真结果摘要</div>
        ${!res?`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--text-3)">${icon('barChart3',40,'var(--card-border)')}<div style="margin-top:10px;font-size:13px">选择方案并运行仿真</div></div>`:`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${resultItems.map(r=>`<div style="padding:10px 12px;border-radius:6px;border:1px solid var(--card-border);background:${r.c}08"><div style="font-size:11px;color:var(--text-3);margin-bottom:4px">${r.l}</div><div style="font-size:18px;font-weight:700;font-family:var(--mono);color:${r.c}">${r.v}</div></div>`).join('')}</div>`}
      </div>
    </div>
    <div class="card" style="padding:16px"><div style="font-weight:700;font-size:14px;margin-bottom:8px">路段速度对比（km/h）</div>${svgDualBar(barData,'road','before','after',T.warn,T.ok,'实施前','实施后',560,220,!!res)}</div>
  </div>`;
}

function runSimulation() {
  if(!state.policySelected||state.policyRunning) return;
  state.policyRunning=true;state.policyProgress=0;state.policyResult=null;render();
  let p=0;
  const id=setInterval(()=>{
    p+=5+Math.random()*12;
    if(p>=100){
      p=100;clearInterval(id);state.policyRunning=false;
      state.policyResult={speed:"+18.4 km/h",flow:"-32.1%",co2:"-4,200 吨/年",transit:"+12.6%",congestion:"1.42 → 1.08",cost:"约 ¥12 亿元",afterSpeeds:POLICY_BEFORE.map(v=>Math.round(v+8+Math.random()*15))};
    }
    state.policyProgress=Math.min(p,100);render();
  },150);
}

// ─── Event binding ───────────────────────────
function bindEvents() {
  document.querySelectorAll('[data-nav]').forEach(el=>el.onclick=()=>{
    cancelAnimationFrame(canvasRaf);stopPredPlay();
    state.page=el.dataset.nav;render();
  });

  // Prediction controls
  const ps=document.getElementById('pred-slider');
  if(ps) ps.oninput=e=>{stopPredPlay();state.predHour=+e.target.value;render();};
  const pp=document.getElementById('pred-prev');
  if(pp) pp.onclick=()=>{stopPredPlay();state.predHour=Math.max(0,state.predHour-1);render();};
  const pn=document.getElementById('pred-next');
  if(pn) pn.onclick=()=>{stopPredPlay();state.predHour=Math.min(23,state.predHour+1);render();};
  const ppl=document.getElementById('pred-play');
  if(ppl) ppl.onclick=()=>{if(state.predPlaying){stopPredPlay();render();}else startPredPlay();};

  // Agent
  document.querySelectorAll('.agent-role').forEach(el=>el.onclick=()=>{
    state.agentRole=el.dataset.role;
    state.agentMessages=[{from:'ai',text:`已切换到「${el.querySelector('span').textContent}」模式。请问有什么可以帮助您的？`}];
    state.agentTyping=false;state.agentInput='';render();
  });
  document.querySelectorAll('.agent-quick').forEach(el=>el.onclick=()=>agentSend(el.dataset.q));
  const ci=document.getElementById('chat-input');
  if(ci){ci.onfocus=()=>ci.style.borderColor='var(--primary)';ci.onblur=()=>ci.style.borderColor='var(--card-border)';ci.onkeydown=e=>{if(e.key==='Enter'){state.agentInput=ci.value;agentSend();}};ci.oninput=()=>state.agentInput=ci.value;}
  const cs=document.getElementById('chat-send');
  if(cs) cs.onclick=()=>{state.agentInput=document.getElementById('chat-input').value;agentSend();};
  // scroll to bottom
  setTimeout(()=>{const el=document.getElementById('chat-scroll');if(el) el.scrollTop=el.scrollHeight;},50);

  // Policy
  document.querySelectorAll('.policy-opt').forEach(el=>el.onclick=()=>{if(!state.policyRunning){state.policySelected=el.dataset.pid;render();}});
  const pr=document.getElementById('policy-run');
  if(pr) pr.onclick=runSimulation;
}

// ── Init ──
render();
</script>
</body>
</html>
